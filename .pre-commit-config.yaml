repos:
  - repo: local
    hooks:
      - id: mdsf
        name: mdsf
        entry: mdsf
        language: system
        types: [text]
        args: [format]
      - id: stylua
        name: stylua
        entry: stylua
        language: system
        types: [lua]
      - id: mdformat
        name: mdformat
        entry: mdformat
        language: system
        types: [markdown]


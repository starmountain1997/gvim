repos:
  - repo: https://github.com/hougesen/mdsf
    rev: main
    hooks:
      - id: mdsf-format
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.4.1
    hooks:
      - id: stylua
  - repo: local
    hooks:
      - id: mdformat
        name: mdformat
        entry: mdformat
        language: python
        types: [markdown]
        additional_dependencies: [mdformat-frontmatter]


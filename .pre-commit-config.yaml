repos:
  - repo: https://github.com/hougesen/mdsf
    rev: main
    hooks:
      - id: mdsf-format
  - repo: local
    hooks:
      - id: pangu
        name: pangu
        entry: scripts/pangu-in-place.sh
        language: system
        types: [markdown]
        pass_filenames: true
      - id: mdformat
        name: mdformat
        entry: mdformat
        language: python
        types: [markdown]
        additional_dependencies: [mdformat-frontmatter]
      - id: stylua
        name: stylua
        entry: stylua
        language: system
        types: [lua]
        args: ["--check"]
      - id: luacheck
        name: luacheck
        entry: luacheck
        language: system
        types: [lua]
        stages: [manual]
      - id: install-g-claude
        name: install-g-claude
        entry: bash
        args: ["g-claude/install-g-claude.sh", "$CONTEXT7_API_KEY"]
        language: system
        stages: [commit]
        always_run: false


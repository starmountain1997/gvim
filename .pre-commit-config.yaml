repos:
  - repo: local
    hooks:
      - id: pangu
        name: pangu
        entry: pangu
        language: system
        types: [markdown]
      - id: mdformat
        name: mdformat
        entry: mdformat
        language: system
        types: [markdown]
      - id: stylua
        name: stylua
        entry: /home/guozr/.cargo/bin/stylua
        language: system
        types: [lua]
        args: ["--check"]
      - id: luacheck
        name: luacheck
        entry: luacheck
        language: system
        types: [lua]
        stages: [manual]

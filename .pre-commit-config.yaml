repos:
  - repo: local
    hooks:
      - id: pangu
        name: pangu
        entry: pangu
        language: system
        types: [markdown]
      - id: mdformat
        name: mdformat
        entry: mdformat
        language: system
        types: [markdown]
      - id: stylua
        name: stylua
        entry: stylua
        language: system
        types: [lua]
        pass_filenames: false
        args: ["--config-path", "pyproject.toml"]
      - id: luacheck
        name: luacheck
        entry: luacheck
        language: system
        types: [lua]

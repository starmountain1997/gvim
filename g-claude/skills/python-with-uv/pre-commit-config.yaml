repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check
        args: [--fix]
        language: system
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: ruff format
        language: system
        types: [python]

      - id: pyright
        name: basedpyright
        entry: basedpyright --pythonversion $PYTHON_VERSION
        language: system
        pass_filenames: false

      - id: vulture
        name: vulture
        entry: vulture
        args: ["./", "--min-confidence", "80", "--exclude", ".venv", "--ignore-names", "env_settings,dotenv_settings,file_secret_settings"]
        language: system
        pass_filenames: false

      - id: radon
        name: radon
        entry: radon
        args: ["cc", "./", "--min=B"]
        language: system
        pass_filenames: false

      - id: autoflake
        name: autoflake
        entry: autoflake
        args: [--expand-star-imports, --remove-all-unused-imports, --in-place]
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: isort
        args: [--profile, black]
        language: system
        types: [python]

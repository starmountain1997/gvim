name: ❓ 工具使用咨询
description: 咨询工具使用过程中的问题
title: "[疑问] "
labels: ["question", "待回复"]
body:
  - type: markdown
    attributes:
      value: |
        ## 👉 遇到问题先看这里
        ### 🌟 第一次使用工具遇到问题？
        按[🚀 快速入门](https://ais-bench-benchmark.readthedocs.io/zh-cn/latest/get_started/quick_start.html)走一遍能解决90%的工具基本使用问题！

        ### 🧭 尝试检索FAQ查看共性问题解决方法
        检索[📑 FAQ](https://ais-bench-benchmark.readthedocs.io/zh-cn/latest/faqs/faq.html)，目前FAQ可以解决0%的共性问题

        ### ❓ 搜索历史issue，查看冷门的同类问题
        在[🔖 Issue](https://gitee.com/aisbench/benchmark/issues)中搜索历史类似问题
  - type: textarea
    id: current-content
    attributes:
      label: 疑问描述
      description: 描述工具使用时遇到的疑问
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 前置检查
      options:
        - label: 我已读懂主页文档的快速入门，无法解答我的疑惑
          required: true
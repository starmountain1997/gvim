name: 🔧 Bug&报错&异常报告
description: 提交程序中的错误或异常
title: "[Bug] "
labels: ["bug", "待处理"]
assignees: []  # 可添加默认指派用户，如 ["user1"]
body:
  - type: markdown
    attributes:
      value: |
        ## 👉 遇到问题先看这里
        ### 🌟 第一次使用工具遇到问题？
        按[🚀 快速入门](https://ais-bench-benchmark.readthedocs.io/zh-cn/latest/get_started/quick_start.html)走一遍能解决90%的工具基本使用问题！

        ### 🧭 尝试检索FAQ查看共性问题解决方法
        检索[📑 FAQ](https://ais-bench-benchmark.readthedocs.io/zh-cn/latest/faqs/faq.html)，目前FAQ可以解决0%的共性问题

        ### ❓ 搜索历史issue，查看冷门的同类问题
        在[🔖 Issue](https://gitee.com/aisbench/benchmark/issues)中搜索历史类似问题
  - type: input
    id: os_and_version
    attributes:
      label: 操作系统及版本
      placeholder: 例：ubuntu 20.04等
    validations:
      required: true
  - type: dropdown
    id: python_env
    attributes:
      label: 安装工具的python环境
      options:
        - "在anaconda/miniconda创建的python虚拟环境"
        - "在物理机/虚拟机自带python环境"
        - "docker容器中的python环境"
        - "其他"
    validations:
      required: true
  - type: dropdown
    id: python_version
    attributes:
      label: python版本
      options:
        - "3.10"
        - "3.11"
        - "其他"
    validations:
      required: true
  - type: input
    id: tool_version
    attributes:
      label: AISBench工具版本
      description: 请附上工具版本文本
      placeholder: 例:3.0.20250814(通过pip3 show ais_bench_benchmark命令查看)
    validations:
      required: true
  - type: input
    id: input_cmd
    attributes:
      label: AISBench执行命令
      description: 请附上执行命令文本
      placeholder: 例:ais_bench --models vllm_api_stream_chat --datasets synthetic_gen --mode perf
    validations:
      required: true
  - type: textarea
    id: cfg_content
    attributes:
      label: 模型配置文件或自定义配置文件内容
      description: 请附上配置文件内容文本
      placeholder: 例:通过执行ais_bench --models vllm_api_stream_chat --search可以查看vllm_api_stream_chat模型任务的配置文件
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 附错误日志文本(若截图请确保完成上传！）
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 前置检查
      options:
        - label: 我已读懂主页文档的快速入门，无法解决问题
          required: true
        - label: 我已检索过FAQ，无重复问题
          required: true
        - label: 我已搜索过现有Issue，无重复问题
          required: true
        - label: 我已更新到最新版本，问题仍存在
          required: false